<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameNjd v01</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div>
        <strong>GameNjd v01</strong>
        <span id="statusText">وضع البناء</span>
      </div>
      <div class="authBox">
        <input id="emailInput" type="email" placeholder="الإيميل" />
        <input id="passInput" type="password" placeholder="الرقم السري" />
        <button id="signupBtn">إنشاء حساب</button>
        <button id="loginBtn">دخول</button>
        <button id="logoutBtn">خروج</button>
      </div>
    </header>

    <main class="layout">
      <section class="worldWrap">
        <canvas id="worldCanvas"></canvas>
        <div id="toast"></div>
        <div id="joystick" class="joystick hidden">
          <div id="stick"></div>
        </div>
      </section>

      <aside id="panel" class="panel">
        <button id="togglePanel" class="mobileOnly">إخفاء / إظهار الإعدادات</button>

        <p id="loginHint">عليك تسجيل حساب لحفظ بنائك وتعديلاتك أو سوف تبقى محليًا فقط.</p>

        <div class="section">
          <button id="walkBtn" class="mainBtn">تجول</button>
        </div>

        <div class="section two">
          <button id="elementsTab" class="active">العناصر</button>
          <button id="layersTab">الطبقة</button>
        </div>

        <div id="elementsPanel" class="section">
          <label>القسم</label>
          <select id="categorySelect"></select>
          <div id="tileset"></div>
        </div>

        <div id="layersPanel" class="section hidden">
          <label>رقم الطبقة</label>
          <input id="layerInput" type="number" min="1" max="99" value="1" />
        </div>

        <div class="section">
          <label>شفافية الجدول</label>
          <input id="gridOpacity" type="range" min="0" max="1" step="0.05" value="0.45" />
        </div>

        <div class="section">
          <label>حجم ريشة الرسم</label>
          <input id="brushSize" type="range" min="1" max="4" step="1" value="1" />
        </div>

        <div class="section two">
          <button id="eraseBtn">ممحاة: إيقاف</button>
          <button id="undoBtn">استعادة</button>
        </div>

        <div class="section">
          <button id="blockBtn">جعل العنصر عائق: إيقاف</button>
        </div>

        <div class="section jumpBox">
          <label>انتقال إلى خلية</label>
          <input id="jumpInput" placeholder="مثال K90" />
          <button id="jumpBtn">سافر</button>
        </div>

        <div class="section">
          <button id="exportBtn">تصدير بيانات Google Sheets</button>
          <button id="importBtn">استيراد بيانات</button>
          <textarea id="sheetData" placeholder="بيانات JSON للتصدير أو الاستيراد"></textarea>
        </div>

        <div class="section help">
          <p>Ctrl + عجلة: تقريب/إبعاد</p>
          <p>Shift + عجلة: يمين/يسار</p>
          <p>Ctrl+C / Ctrl+V: نسخ ولصق</p>
          <p>الأسهم: تحريك العنصر المحدد بكسل واحد</p>
        </div>
      </aside>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
