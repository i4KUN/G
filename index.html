<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>GameNjd v11.5</title>

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />

  <link rel="icon" href="https://n4anime.github.io/bon/icon/va2.png" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="بون سيكاي" />
  <meta property="og:description" content="نافذة على عالمي بين أفكاري ومشاعري وهواياتي ♡ من أنمي ومانجا وألعاب.. بروقان وهدوء." />
  <meta property="og:image" content="https://n4anime.github.io/bon/icon/cover2.png" />
  <meta property="og:url" content="https://n4anime.github.io/bon/" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://n4anime.github.io/bon/icon/cover2.png" />

  <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400;600;800&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="loadingScreen">
    <div class="loaderBox">
      <div class="loaderTitle">انتظر التحميل</div>
      <div class="loaderBar">
        <span></span>
      </div>
    </div>
  </div>

  <div id="app">
    <header class="topbar">
      <div class="brandBox">
        <img
          class="brandLogo"
          src="https://n4anime.github.io/bon/icon/cover2.png"
          alt="GameNjd"
        />
        <strong>GameNjd v11.5</strong>
        <span id="statusText">وضع البناء</span>
      </div>

      <div class="authBox">
        <input id="displayNameInput" placeholder="الاسم الظاهر" maxlength="20" />

        <input id="emailInput" type="email" placeholder="الإيميل" autocomplete="email" />
        <input id="passInput" type="password" placeholder="الرقم السري" autocomplete="current-password" />

        <button id="signupBtn" type="button">إنشاء حساب</button>
        <button id="loginBtn" type="button">دخول</button>
        <button id="logoutBtn" type="button">خروج</button>

        <span id="authStateBadge" class="authBadge off">أنت لم تسجل دخول</span>

        <input id="profileIdInput" placeholder="معرفك" maxlength="16" />
        <input id="profilePassInput" type="password" placeholder="رقم سري للمعرف" autocomplete="new-password" />

        <button id="profileCreateBtn" type="button">إنشاء / حفظ المعرف</button>
        <button id="profileLoginBtn" type="button">دخول بالمعرف</button>
        <button id="profileLinkEmailBtn" type="button">ربط المعرف بالإيميل</button>

        <span id="profileIdBox"></span>
      </div>
    </header>

    <main class="layout">
      <section class="worldWrap">
        <canvas id="worldCanvas"></canvas>

        <div id="toast"></div>

        <div id="joystick" class="joystick hidden">
          <div id="stick"></div>
        </div>

        <button id="mobileGearBtn" class="floatingBtn gearBtn" type="button" title="الإعدادات">
          <i class="fa-solid fa-gear"></i>
        </button>

        <div id="zoomControls" class="zoomControls">
          <button id="zoomInBtn" type="button" title="تكبير">+</button>
          <button id="zoomOutBtn" type="button" title="تصغير">−</button>
        </div>

        <button id="stopWalkBtn" class="stopWalkBtn hidden" type="button">
          إيقاف التجول
        </button>
      </section>

      <aside id="panel" class="panel">
        <button id="togglePanel" class="mobileOnly" type="button">
          إخفاء / إظهار الإعدادات
        </button>

        <p id="loginHint">
          سجّل دخولك أو استخدم المعرف لحفظ بنائك وتعديلاتك.
        </p>

        <div class="section">
          <button id="walkBtn" class="mainBtn" type="button">تجول</button>
          <button id="changeCharacterBtn" class="mainBtn secondaryBtn" type="button">
            تغيير الشخصية
          </button>
        </div>

        <div id="elementsPanel" class="section">
          <button id="toggleTilesBtn" class="panelToggle" type="button">
            العناصر / إظهار وإخفاء
          </button>

          <div id="tilesControls" class="panelContent">
            <label for="categorySelect">القسم</label>
            <select id="categorySelect"></select>

            <label for="sizeFilter">المقاس</label>
            <select id="sizeFilter">
              <option value="all">الكل</option>
            </select>

            <div id="tileset"></div>
          </div>
        </div>

        <div id="layersPanel" class="section">
          <label>الطبقة</label>

          <div id="layerButtons" class="choiceButtons">
            <button data-layer="1" class="active" type="button">1</button>
            <button data-layer="2" type="button">2</button>
            <button data-layer="3" type="button">3</button>
            <button data-layer="4" type="button">4</button>
            <button data-layer="5" type="button">5</button>
          </div>

          <input id="layerInput" type="hidden" min="1" max="5" value="1" />
        </div>

        <div class="section">
          <label for="gridOpacity">شفافية الجدول</label>
          <input id="gridOpacity" type="range" min="0" max="1" step="0.05" value="0.45" />
        </div>

        <div class="section">
          <label for="brushSize">حجم ريشة الرسم</label>
          <input id="brushSize" type="range" min="1" max="4" step="1" value="1" />
        </div>

        <div class="section">
          <label for="itemScale">حجم العنصر</label>
          <input id="itemScale" type="range" min="0.5" max="1.8" step="0.05" value="1" />
        </div>

        <div class="section two">
          <button id="eraseBtn" type="button">ممحاة: إيقاف</button>
          <button id="undoBtn" type="button">استعادة</button>
        </div>

        <div class="section two">
          <button id="blockBtn" type="button">جعل العنصر عائق</button>
          <button id="flipBtn" type="button">عكس العنصر</button>
        </div>

        <div class="section two">
          <button id="deleteSelectedBtn" type="button">حذف العنصر المحدد</button>
          <button id="deleteAllBtn" type="button">حذف جميع عناصري</button>
        </div>

        <div class="section jumpBox">
          <label for="jumpInput">انتقال إلى خلية</label>
          <input id="jumpInput" placeholder="مثال IP250" />
          <button id="jumpBtn" type="button">سافر</button>
        </div>

        <div class="section two">
          <button id="shortcutsBtn" type="button">شرح الاختصارات</button>
          <button id="aboutBtn" type="button">من نحن</button>
        </div>
      </aside>
    </main>
  </div>

  <div id="characterModal" class="characterModal hidden">
    <div class="characterBox">
      <h2>اختر شخصيتك</h2>
      <p>اختر شخصية واحدة، وسيتم حفظها مع معرفك.</p>
      <div id="characterChoices"></div>
    </div>
  </div>

  <div id="infoModal" class="characterModal hidden">
    <div class="characterBox smallBox">
      <h2 id="infoTitle">تنبيه</h2>
      <p id="infoText"></p>
      <button id="infoCloseBtn" class="mainBtn" type="button">إغلاق</button>
    </div>
  </div>

  <script src="app.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import {
      getDatabase,
      ref,
      set,
      get,
      update,
      remove,
      onValue
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

    import {
      getAuth,
      onAuthStateChanged,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      signInAnonymously
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD7-Ge0zjrsJNqEL4hAx3JSU0Cb-PUhlOg",
      authDomain: "gamenjd-0001.firebaseapp.com",
      databaseURL: "https://gamenjd-0001-default-rtdb.firebaseio.com",
      projectId: "gamenjd-0001",
      storageBucket: "gamenjd-0001.firebasestorage.app",
      messagingSenderId: "1076362661145",
      appId: "1:1076362661145:web:4c171f17ec05854b324988"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    window.db = db;
    window.auth = auth;

    window.ref = ref;
    window.set = set;
    window.get = get;
    window.update = update;
    window.remove = remove;
    window.onValue = onValue;

    window.onAuthStateChanged = onAuthStateChanged;
    window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
    window.signInWithEmailAndPassword = signInWithEmailAndPassword;
    window.signOut = signOut;
    window.signInAnonymously = signInAnonymously;

  
  </script>
</body>
</html>
